<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">加载中... | AI 视频生成模型</title>
    <link rel="icon" id="favicon">
    <script>
        window.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#2563eb';
            ctx.font = 'bold 40px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('V', 32, 34);
            document.getElementById('favicon').href = canvas.toDataURL('image/png');
        };
    </script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .loading { padding: 4rem; text-align: center; color: #666; }
        .error { padding: 4rem; text-align: center; color: #ef4444; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <a href="../index.html" class="logo" style="text-decoration: none; color: inherit;">AI Video</a>
            <ul class="nav-links">
                <li><a href="../index.html#model-list">Models</a></li>
                <li><a href="../about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <div class="breadcrumb" id="breadcrumb">
        <a href="../index.html">目录</a>
        <span>/</span>
        <span id="breadcrumb-name">加载中...</span>
    </div>

    <main id="main-content">
        <div class="loading">加载中...</div>
    </main>

    <footer>
        <p><a href="../index.html">← 返回目录</a></p>
    </footer>

    <script>
        const chartLabels = {
            videoQuality: '视频质量',
            speed: '生成速度',
            costPerformance: '性价比',
            usability: '易用性',
            features: '功能丰富度',
            consistency: '一致性',
            audioSync: '音画同步',
            chineseSupport: '中文支持',
            apiSupport: 'API 支持',
            fluency: '流畅度',
            multiSubjectConsistency: '多主体一致',
            frameRateAdvantage: '高帧率优势',
            creativeSupport: '创意支持',
            stability: '稳定性',
            scriptGeneration: '脚本生成',
            editingCapability: '编辑能力',
            multiModelSupport: '多模型支持',
            commercialLicense: '商业授权'
        };

        async function loadModel() {
            const params = new URLSearchParams(window.location.search);
            const modelId = params.get('id');

            if (!modelId) {
                document.getElementById('main-content').innerHTML = '<div class="error">未指定模型 ID</div>';
                return;
            }

            try {
                const response = await fetch('../data/models.json');
                const data = await response.json();
                const model = data.models.find(m => m.id === modelId);

                if (!model) {
                    document.getElementById('main-content').innerHTML = '<div class="error">未找到模型: ' + modelId + '</div>';
                    return;
                }

                document.getElementById('page-title').textContent = model.name + ' | AI 视频生成模型';
                document.getElementById('breadcrumb-name').textContent = model.name;

                const details = model.details;
                const chartsHtml = Object.entries(details.charts).map(([key, value]) => `
                    <div class="chart-item">
                        <div class="chart-label">
                            <span>${chartLabels[key] || key}</span>
                            <span>${value}%</span>
                        </div>
                        <div class="chart-bar">
                            <div class="chart-bar-fill" style="width: ${value}%;"></div>
                        </div>
                    </div>
                `).join('');

                const prosHtml = details.pros.map(p => `<li>${p}</li>`).join('');
                const consHtml = details.cons.map(c => `<li>${c}</li>`).join('');
                const scenariosHtml = details.scenarios.map(s => `<li>${s}</li>`).join('');
                const resourcesHtml = details.resources.map(r => `
                    <li>
                        <a href="${r.url}" target="_blank">${r.name}</a>
                    </li>
                `).join('');

                const otherModels = data.models.filter(m => m.id !== modelId && m.rank <= model.rank + 2 && m.rank >= model.rank - 2).slice(0, 3);
                const relatedHtml = otherModels.map(m => `
                    <a href="model.html?id=${m.id}" class="related-card">
                        <div class="related-card-rank">${String(m.rank).padStart(2, '0')}</div>
                        <div class="related-card-name">${m.name}</div>
                        <div class="related-card-company">${m.company}</div>
                    </a>
                `).join('');

                document.getElementById('main-content').innerHTML = `
                    <div class="model-header">
                        <div class="model-title">
                            <div class="model-title-left">
                                <div class="model-header-row">
                                    ${model.badge ? `<span class="badge badge-${model.badgeType}">${model.badge}</span>` : ''}
                                    <span class="model-company">${model.company}</span>
                                </div>
                                <h1 class="model-name">${model.name}</h1>
                                <div class="model-tags">
                                    ${model.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                                </div>
                            </div>
                            <div class="model-price-section">
                                <div class="price">${model.price}</div>
                                <a href="${model.url}" class="btn-primary" target="_blank">
                                    访问官网
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M7 17L17 7M17 7H7M17 7V17"/>
                                    </svg>
                                </a>
                            </div>
                        </div>
                        <div class="model-meta">
                            <div class="meta-item">
                                <span class="meta-label">发布公司</span>
                                <span class="meta-value">${details.publisher}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">视频时长</span>
                                <span class="meta-value">${details.duration}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">分辨率</span>
                                <span class="meta-value">${details.resolution}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">核心能力</span>
                                <span class="meta-value">${details.capabilities}</span>
                            </div>
                        </div>
                    </div>

                    <div class="section chart-section">
                        <h2 class="chart-title">性能对比</h2>
                        <div class="chart-grid">
                            ${chartsHtml}
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">详细介绍</h2>
                        <div class="section-content">
                            <p>${details.introduction}</p>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">优缺点分析</h2>
                        <div class="pros-cons">
                            <ul class="pros-list">
                                ${prosHtml}
                            </ul>
                            <ul class="cons-list">
                                ${consHtml}
                            </ul>
                        </div>
                    </div>

                    <div class="section">
                        <h2 class="section-title">适用场景</h2>
                        <ul class="scenarios-list">
                            ${scenariosHtml}
                        </ul>
                    </div>

                    <div class="section">
                        <h2 class="section-title">教程资源</h2>
                        <ul class="resources-list">
                            ${resourcesHtml}
                        </ul>
                    </div>

                    <div class="related-section">
                        <h2 class="related-title">相关推荐</h2>
                        <div class="related-grid">
                            ${relatedHtml}
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Failed to load model:', error);
                document.getElementById('main-content').innerHTML = '<div class="error">加载失败，请刷新重试</div>';
            }
        }

        loadModel();
    </script>
</body>
</html>
