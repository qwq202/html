<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视频生成模型 | 目录</title>
    <link rel="icon" id="favicon">
    <script>
        window.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            // 绘制蓝色字母 V
            ctx.fillStyle = '#2563eb';
            ctx.font = 'bold 40px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('V', 32, 34);
            
            // 设置 favicon
            document.getElementById('favicon').href = canvas.toDataURL('image/png');
        };
    </script>
    <style>
        @font-face {
            font-family: 'Space Grotesk';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('fonts/SpaceGrotesk-400.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Space Grotesk';
            font-style: normal;
            font-weight: 500;
            font-display: swap;
            src: url('fonts/SpaceGrotesk-500.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Space Grotesk';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url('fonts/SpaceGrotesk-600.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Space Grotesk';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('fonts/SpaceGrotesk-700.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f0f0;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(250, 250, 250, 0.9);
            backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 1.5rem 3rem;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #1a1a1a;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 3rem;
        }

        header {
            padding: 12rem 0 8rem;
            border-bottom: 1px solid #eee;
            margin-bottom: 6rem;
        }

        header h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        header p {
            font-size: 1.25rem;
            color: #666;
            max-width: 540px;
            line-height: 1.7;
        }

        .meta {
            margin-top: 3rem;
            display: flex;
            gap: 3rem;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .meta-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #999;
        }

        .meta-value {
            font-size: 1rem;
            font-weight: 600;
        }

        .model-list {
            display: flex;
            flex-direction: column;
        }

        .model-item {
            display: grid;
            grid-template-columns: 3rem 1fr auto;
            gap: 2rem;
            padding: 2.5rem 0;
            border-bottom: 1px solid #eee;
            align-items: start;
            transition: background 0.2s;
        }

        .model-item:hover {
            background: #fff;
            margin: 0 -1.5rem;
            padding: 2.5rem 1.5rem;
        }

        .rank {
            font-size: 0.875rem;
            color: #999;
            font-weight: 500;
            padding-top: 0.25rem;
        }

        .model-info {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .model-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .model-name {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .model-company {
            font-size: 0.875rem;
            color: #999;
        }

        .model-desc {
            font-size: 0.95rem;
            color: #666;
            max-width: 600px;
            line-height: 1.7;
        }

        .model-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            font-size: 0.75rem;
            color: #666;
            background: #f0f0f0;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
        }

        .model-action {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.75rem;
        }

        .price {
            font-size: 0.9rem;
            color: #999;
        }

        .price strong {
            color: #1a1a1a;
            font-size: 1rem;
        }

        .link {
            font-size: 0.8rem;
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
            padding-bottom: 0.1rem;
            transition: border-color 0.2s;
        }

        .link:hover {
            border-color: #1a1a1a;
        }

        .model-item a.model-card-link {
            text-decoration: none;
            color: inherit;
            display: contents;
        }

        .model-item a.model-card-link:hover {
            text-decoration: none;
        }

        .model-item:has(.model-card-link:hover) {
            background: #fff;
            margin: 0 -1.5rem;
            padding: 2.5rem 1.5rem;
        }

        .badge {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-weight: 600;
        }

        .badge-top {
            background: #1a1a1a;
            color: #fff;
        }

        .badge-new {
            background: #f0f0f0;
            color: #666;
        }

        footer {
            max-width: 1200px;
            margin: 8rem auto 4rem;
            padding: 0 3rem;
            text-align: center;
        }

        footer p {
            font-size: 0.8rem;
            color: #999;
        }

        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            .nav-links {
                gap: 1.5rem;
            }

            .nav-links a {
                font-size: 0.85rem;
            }

            main {
                padding: 0 1.5rem;
            }

            header {
                padding: 8rem 0 4rem;
                margin-bottom: 3rem;
            }

            header h1 {
                font-size: 2.2rem;
            }

            header p {
                font-size: 1rem;
            }

            .meta {
                flex-direction: column;
                gap: 1.5rem;
                margin-top: 2rem;
            }

            .model-item {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 2rem 0;
            }

            .rank {
                display: none;
            }

            .model-header {
                flex-wrap: wrap;
            }

            .model-name {
                font-size: 1.25rem;
            }

            .model-desc {
                font-size: 0.9rem;
            }

            .model-action {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding-top: 1rem;
            }

            footer {
                padding: 0 1.5rem;
                margin: 4rem auto 2rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.8rem;
            }

            .model-item:hover {
                margin: 0 -1rem;
                padding: 1.5rem 1rem;
            }

            .tag {
                font-size: 0.7rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <div class="logo">AI Video</div>
            <ul class="nav-links">
                <li><a href="index.html#model-list">Models</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <header>
            <h1>AI 视频生成模型<br>精选目录</h1>
            <p>收录当前最优秀的 AI 视频生成工具，基于性能、质量和易用性综合评估。</p>
            <div class="meta">
                <div class="meta-item">
                    <span class="meta-label">收录数量</span>
                    <span class="meta-value">17 个模型</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">更新时间</span>
                    <span class="meta-value">2026 年 3 月</span>
                </div>
            </div>
        </header>

        <section class="model-list" id="model-list"></section>
    </main>

    <script src="js/renderModels.js"></script>

    <footer id="about">
        <p>AI Video Models Directory · 2026</p>
    </footer>
</body>
</html>
